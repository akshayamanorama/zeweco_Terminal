
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZEWECO TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        overflow-x: hidden;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Dashboard typography – match screenshot */
      .dashboard-card-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #71717a;
      }
      .dark .dashboard-card-label { color: #a1a1aa; }
      .dashboard-card-value {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #18181b;
      }
      .dark .dashboard-card-value { color: #e4e4e7; }
      .dashboard-table-head {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #71717a;
      }
      .dark .dashboard-table-head { color: #a1a1aa; }
      .dashboard-entity-name {
        font-size: 14px;
        font-weight: 700;
        color: #18181b;
      }
      .dark .dashboard-entity-name { color: #e4e4e7; }
      /* Small labels: status, responsible – subtle, title case */
      .dashboard-label-sm {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.02em;
        text-transform: capitalize;
        color: #52525b;
      }
      .dark .dashboard-label-sm { color: #a1a1aa; }
      .dashboard-cell-primary {
        font-size: 13px;
        font-weight: 400;
        color: #3f3f46;
      }
      .dark .dashboard-cell-primary { color: #d4d4d8; }
      .dashboard-cell-secondary {
        font-size: 12px;
        font-weight: 400;
        color: #71717a;
      }
      .dark .dashboard-cell-secondary { color: #a1a1aa; }
      .dashboard-pill {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .dashboard-route-label {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #71717a;
      }
      .dark .dashboard-route-label { color: #71717a; }
      /* Smooth transitions for all themeable properties */
      * {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      }

      /* Custom scrollbar for terminal feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d4d4d8;
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #27272a;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a1a1aa;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react": "https://esm.sh/react@^19.2.4",
        "react/": "https://esm.sh/react@^19.2.4/"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
